services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: seen
      POSTGRES_PASSWORD: seen
      POSTGRES_DB: seen
    ports:
      - "5432:5432"
    volumes:
      - seen-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - seen-redis:/data
    command: redis-server --appendonly yes

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - seen-minio:/data
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minio minio-password; do sleep 1; done;
      mc mb --ignore-existing local/seen-avatars;
      mc anonymous set none local/seen-avatars;
      "

volumes:
  seen-postgres:
  seen-redis:
  seen-minio:
