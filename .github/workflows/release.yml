name: Promote tag to main

on:
  push:
    tags:
      - '*' # any tag promotes its commit to main

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to push to main
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Update main to tag commit (no merge/squash)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          tag_sha=$(git rev-list -n 1 "$GITHUB_REF_NAME")
          git fetch origin main --prune
          git checkout -B main "$tag_sha"
          git push origin main --force-with-lease
